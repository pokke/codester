name: Build Windows installer

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # krävs för att skapa GitHub Releases vid v*-taggar

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build (electron-vite)
        run: npm run build

      - name: Package installer (electron-builder)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          # Code signing (valfritt): lägg certifikatet som base64 i secrets.
          # Variablerna sätts bara om secret finns – annars byggs osignerat
          # (tom CSC_LINK får annars electron-builder att krascha).
          SECRET_CSC_LINK: ${{ secrets.CSC_LINK }}
          SECRET_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$SECRET_CSC_LINK" ]; then
            export CSC_LINK="$SECRET_CSC_LINK"
            export CSC_KEY_PASSWORD="$SECRET_CSC_KEY_PASSWORD"
            echo "Code signing certificate found — signing build."
          else
            echo "No code signing certificate — building unsigned."
          fi
          # --publish always laddar upp installer + latest.yml + blockmap till
          # GitHub Release, vilket auto-uppdateringen (electron-updater) behöver.
          npx electron-builder --win --publish always
