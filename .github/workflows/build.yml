name: Build Windows installer

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Avbryt äldre/överflödiga körningar för samma ref (t.ex. dubbla main-pushar).
# Tagg-körningar (releaser) får varsin grupp och avbryts aldrig.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # krävs för att skapa GitHub Releases vid v*-taggar

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # hämta all historik + taggar så vi kan jämföra versioner
          fetch-tags: true

      - name: Determine if this is the newest tag
        id: guard
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          current="${GITHUB_REF_NAME}"
          highest="$(git tag -l 'v*' | sort -V | tail -n1)"
          echo "Denna tagg: $current — högsta taggen: $highest"
          if [ "$current" = "$highest" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Hoppar över release: $current är inte den nyaste taggen ($highest finns)."
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build (electron-vite)
        run: npm run build

      - name: Package installer (electron-builder)
        if: startsWith(github.ref, 'refs/tags/v') && steps.guard.outputs.is_latest == 'true'
        shell: bash
        env:
          # Code signing (valfritt): lägg certifikatet som base64 i secrets.
          # Variablerna sätts bara om secret finns – annars byggs osignerat
          # (tom CSC_LINK får annars electron-builder att krascha).
          SECRET_CSC_LINK: ${{ secrets.CSC_LINK }}
          SECRET_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$SECRET_CSC_LINK" ]; then
            export CSC_LINK="$SECRET_CSC_LINK"
            export CSC_KEY_PASSWORD="$SECRET_CSC_KEY_PASSWORD"
            echo "Code signing certificate found — signing build."
          else
            echo "No code signing certificate — building unsigned."
          fi
          npx electron-builder --win --publish never

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && steps.guard.outputs.is_latest == 'true'
        uses: softprops/action-gh-release@v2
        with:
          # Installer + manifest (latest.yml) + blockmap krävs för auto-update
          files: |
            release/*.exe
            release/latest.yml
            release/*.blockmap
          draft: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
