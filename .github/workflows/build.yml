name: Build Windows installer

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tagg att bygga & publicera (tom = senaste v*-taggen)'
        required: false
        default: ''

# Avbryt äldre/överflödiga körningar för samma ref (t.ex. dubbla main-pushar).
# Tagg-körningar (releaser) och manuella körningar får varsin grupp och avbryts aldrig.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.tag }}
  cancel-in-progress: ${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # krävs för att skapa GitHub Releases vid v*-taggar

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # hämta all historik + taggar så vi kan jämföra versioner
          fetch-tags: true

      - name: Determine target tag & whether to release
        id: guard
        shell: bash
        run: |
          highest="$(git tag -l 'v*' | sort -V | tail -n1)"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manuell körning: bygg vald tagg, annars den nyaste.
            target="${{ github.event.inputs.tag }}"
            [ -z "$target" ] && target="$highest"
            if ! git rev-parse -q --verify "refs/tags/$target" >/dev/null; then
              echo "::error::Taggen $target finns inte."
              exit 1
            fi
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "target=$target" >> "$GITHUB_OUTPUT"
            echo "::notice::Manuell körning bygger tagg $target"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            current="${GITHUB_REF_NAME}"
            echo "target=$current" >> "$GITHUB_OUTPUT"
            echo "Denna tagg: $current — högsta taggen: $highest"
            if [ "$current" = "$highest" ]; then
              echo "release=true" >> "$GITHUB_OUTPUT"
            else
              echo "release=false" >> "$GITHUB_OUTPUT"
              echo "::notice::Hoppar över release: $current är inte den nyaste taggen ($highest finns)."
            fi
          else
            # Push till main / PR: bara CI (typecheck + build), ingen release.
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout target tag (manuell körning)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: git checkout "refs/tags/${{ steps.guard.outputs.target }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build (electron-vite)
        run: npm run build

      - name: Package installer (electron-builder)
        if: steps.guard.outputs.release == 'true'
        shell: bash
        env:
          # Code signing (valfritt): lägg certifikatet som base64 i secrets.
          # Variablerna sätts bara om secret finns – annars byggs osignerat
          # (tom CSC_LINK får annars electron-builder att krascha).
          SECRET_CSC_LINK: ${{ secrets.CSC_LINK }}
          SECRET_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$SECRET_CSC_LINK" ]; then
            export CSC_LINK="$SECRET_CSC_LINK"
            export CSC_KEY_PASSWORD="$SECRET_CSC_KEY_PASSWORD"
            echo "Code signing certificate found — signing build."
          else
            echo "No code signing certificate — building unsigned."
          fi
          npx electron-builder --win --publish never

      - name: Publish GitHub Release
        if: steps.guard.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          # Sätt taggen explicit (github.ref är main vid manuell körning).
          tag_name: ${{ steps.guard.outputs.target }}
          # Installer + manifest (latest.yml) + blockmap krävs för auto-update
          files: |
            release/*.exe
            release/latest.yml
            release/*.blockmap
          draft: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
